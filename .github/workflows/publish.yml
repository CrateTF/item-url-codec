name: Publish to npm

on:
  release:
    types:
      - published

permissions:
  contents: read

jobs:
  publish:
    name: Publish package
    if: github.event.release.prerelease == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Check out release tag
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci

      - name: Validate source and contract
        run: npm run check

      - name: Verify release tag matches package version
        shell: bash
        run: |
          package_version="$(node --input-type=module --eval "import pkg from './package.json' with { type: 'json' }; process.stdout.write(pkg.version)")"
          expected_tag="v${package_version}"

          if [[ "${{ github.event.release.tag_name }}" != "${expected_tag}" ]]; then
            echo "Release tag '${{ github.event.release.tag_name }}' must match package version '${expected_tag}'." >&2
            exit 1
          fi

      - name: Verify package contents
        run: npm pack --dry-run

      - name: Check whether version is already published
        id: registry
        shell: bash
        run: |
          package_name="$(node --input-type=module --eval "import pkg from './package.json' with { type: 'json' }; process.stdout.write(pkg.name)")"
          package_version="$(node --input-type=module --eval "import pkg from './package.json' with { type: 'json' }; process.stdout.write(pkg.version)")"

          if npm view "${package_name}@${package_version}" version --json >/dev/null 2>&1; then
            echo "already-published=true" >> "${GITHUB_OUTPUT}"
            echo "${package_name}@${package_version} is already published; nothing to do."
          else
            echo "already-published=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Publish package
        if: steps.registry.outputs.already-published != 'true'
        run: npm publish --access public
